# main に push すると Flutter Web をビルドして GitHub Pages に公開する
# 前提: リポジトリを Public にするか、有料プランで Private Pages を有効化すること
#       Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build web --release --base-href "/Gravi-Blast/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - id: deployment
        uses: actions/deploy-pages@v4
